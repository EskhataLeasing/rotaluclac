<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Leasing Calculator</title>
<style>
body { font-family: Arial; padding:20px; }
input, select { margin:5px; padding:5px; }
table { border-collapse: collapse; margin-top:20px; }
td, th { border:1px solid #ccc; padding:5px; }
</style>
</head>

<body>

<h2>Calculator</h2>

<label>Тип:</label>
<select id="type">
  <option value="leasing">Лизинг</option>
  <option value="installment">Рассрочка</option>
</select><br>

<label>Режим (для рассрочки):</label>
<select id="mode">
  <option value="commission">Комиссия</option>
  <option value="extra">Доп.платежи</option>
  <option value="mixed">Смешанный</option>
</select><br>

<label>Цена:</label>
<input id="price" value="100000000"><br>

<label>Аванс %:</label>
<input id="advPct" value="20"><br>

<label>Срок (мес):</label>
<input id="term" value="12"><br>

<button onclick="calculate()">Рассчитать</button>

<div id="result"></div>

<script>

// =====================
// CONFIG
// =====================
const TARGET_IRR = 0.32;
const LEASING_RATE = 0.2975;

// =====================
// HELPERS
// =====================
function parseVal(v){
  return Number(String(v).replace(/\s/g,'')) || 0;
}

// =====================
// ANNUITY
// =====================
function calcAnnuity(amount, rate, term){
  const arr=[];
  let pay;

  if(rate===0){
    pay=amount/term;
  }else{
    const pv=Math.pow(1+rate,term);
    pay=amount*(rate*pv)/(pv-1);
  }

  let bal=amount;

  for(let i=1;i<=term;i++){
    let interest=bal*rate;
    let principal=pay-interest;

    if(principal>bal) principal=bal;

    bal-=principal;
    if(bal<0) bal=0;

    arr.push({n:i,pay,principal,interest,bal});
  }

  return arr;
}

// =====================
// INSTALLMENT
// =====================
function buildInstallment(debt, term, extra){
  const arr=[];
  let bal=debt;
  let per=debt/term;

  for(let i=1;i<=term;i++){
    if(i===term) per=bal;

    bal-=per;
    if(bal<0) bal=0;

    arr.push({
      n:i,
      pay: per + extra,
      principal: per,
      interest: 0,
      bal
    });
  }

  return arr;
}

// =====================
// IRR
// =====================
function calcIRR(cfs){
  let low=-0.9999, high=10, mid;

  for(let i=0;i<100;i++){
    mid=(low+high)/2;

    let npv=0;
    for(let t=0;t<cfs.length;t++){
      npv += cfs[t]/Math.pow(1+mid,t);
    }

    if(Math.abs(npv)<0.0001) break;

    if(npv>0) low=mid;
    else high=mid;
  }

  return mid*12;
}

// =====================
// CASHFLOW
// =====================
function buildCF(price, advPct, term, commission, extra, type){

  const advance = price * advPct;
  const debt = price - advance;

  let schedule;

  if(type==='leasing'){
    schedule = calcAnnuity(debt, LEASING_RATE/12, term);
  }else{
    schedule = buildInstallment(debt, term, extra);
  }

  const cfs = [];
  cfs.push(-price + advance + price*commission);

  schedule.forEach(r=>cfs.push(r.pay));

  return cfs;
}

// =====================
// CALC COMMISSION
// =====================
function calcCommission(price, advPct, term){

  let low=0, high=1, mid;

  for(let i=0;i<40;i++){
    mid=(low+high)/2;

    const irr = calcIRR(buildCF(price, advPct, term, mid, 0, 'installment'));

    if(Math.abs(irr-TARGET_IRR)<0.0001) break;

    if(irr<TARGET_IRR) low=mid;
    else high=mid;
  }

  return mid;
}

// =====================
// CALC EXTRA
// =====================
function calcExtra(price, advPct, term, commission){

  let low=0, high=100000000, mid;

  for(let i=0;i<40;i++){
    mid=(low+high)/2;

    const irr = calcIRR(buildCF(price, advPct, term, commission, mid, 'installment'));

    if(Math.abs(irr-TARGET_IRR)<0.0001) break;

    if(irr<TARGET_IRR) low=mid;
    else high=mid;
  }

  return Math.ceil(mid/50000)*50000;
}

// =====================
// MAIN
// =====================
function calculate(){

  const type = document.getElementById('type').value;
  const mode = document.getElementById('mode').value;

  const price = parseVal(priceInput.value);
  const advPct = parseVal(advPctInput.value)/100;
  const term = parseInt(termInput.value);

  let commission=0;
  let extra=0;
  let schedule;

  if(type==='leasing'){
    commission=0.025;

    const debt = price - price*advPct;
    schedule = calcAnnuity(debt, LEASING_RATE/12, term);

  }else{

    if(mode==='commission'){
      commission = calcCommission(price, advPct, term);
    }

    if(mode==='extra'){
      extra = calcExtra(price, advPct, term, 0);
    }

    if(mode==='mixed'){
      commission=0.05;
      extra = calcExtra(price, advPct, term, commission);
    }

    const debt = price - price*advPct;
    schedule = buildInstallment(debt, term, extra);
  }

  render(schedule, commission, extra);
}

// =====================
// RENDER
// =====================
function render(schedule, commission, extra){

  let html = `<p>Комиссия: ${(commission*100).toFixed(2)}%</p>`;
  html += `<p>Доп.платеж: ${extra.toLocaleString()}</p>`;

  html += `<table><tr>
    <th>#</th><th>Платеж</th><th>Основной</th><th>Проценты</th><th>Остаток</th>
  </tr>`;

  schedule.forEach(r=>{
    html += `<tr>
      <td>${r.n}</td>
      <td>${Math.round(r.pay)}</td>
      <td>${Math.round(r.principal)}</td>
      <td>${Math.round(r.interest)}</td>
      <td>${Math.round(r.bal)}</td>
    </tr>`;
  });

  html += `</table>`;

  document.getElementById('result').innerHTML = html;
}

</script>

</body>
</html>
