<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eskhata Leasing – Calculator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1a4fa0;
            --brand-blue-light: #2563c7;
            --brand-accent: #6c63ff;
            --bg: #eef1f7;
            --card: #fff;
            --text: #0f1923;
            --muted: #6b7a8d;
            --border: #dde3ed;
            --shadow: 0 2px 16px rgba(26,79,160,.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0 }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh }
        header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 0 40px; height: 60px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 1px 8px rgba(26,79,160,.06);
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none }
        .logo-icon { width: 36px; height: 36px; background: var(--brand-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 800; flex-shrink: 0 }
        .lang-switcher { display: flex; gap: 14px }
        .lang-switcher a { font-size: 13px; font-weight: 600; color: var(--muted); text-decoration: none; cursor: pointer; transition: color .2s }
        .lang-switcher a:hover, .lang-switcher a.active { color: var(--brand-blue) }
        main { max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px }
        .calculator-grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; align-items: start }
        .card { background: var(--card); border-radius: 16px; padding: 28px; box-shadow: var(--shadow) }
        .type-sw { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px }
        .type-btn {
            padding: 11px 8px; border: 2px solid var(--border); border-radius: 10px;
            background: #f8fafd; font-family: 'Manrope', sans-serif; font-size: 13px;
            font-weight: 700; color: var(--muted); cursor: pointer; transition: all .2s; text-align: center;
        }
        .type-btn.active { border-color: var(--brand-blue); background: #eef4ff; color: var(--brand-blue) }
        .mode-sw { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 14px }
        .mode-btn {
            padding: 8px 5px; border: 1.5px solid var(--border); border-radius: 8px;
            background: #f8fafd; font-family: 'Manrope', sans-serif; font-size: 12px;
            font-weight: 600; color: var(--muted); cursor: pointer; transition: all .2s; text-align: center;
        }
        .mode-btn.active { border-color: var(--brand-accent); background: #f0edff; color: var(--brand-accent) }
        .form-group { margin-bottom: 16px }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px }
        input[type=text], input[type=number] {
            width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 15px; font-family: 'Manrope', sans-serif; font-weight: 500; color: var(--text);
            background: #f8fafd; transition: border-color .2s, box-shadow .2s; outline: none;
        }
        input:focus { border-color: var(--brand-blue-light); box-shadow: 0 0 0 3px rgba(37,99,199,.1); background: #fff }
        .input-wrap { position: relative }
        .input-wrap input { padding-right: 36px }
        .input-suffix { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); font-weight: 600; pointer-events: none }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 5px }
        .btn-primary { background: linear-gradient(135deg, var(--brand-blue), var(--brand-accent)); color: #fff }
        .btn-primary:hover { box-shadow: 0 4px 16px rgba(108,99,255,.35); transform: translateY(-1px) }
        .btn-secondary { background: var(--text); color: #fff }
        .btn-secondary:hover { background: #1e2a38; transform: translateY(-1px) }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px }
        .result-cell { background: #f4f7fb; border-radius: 12px; padding: 13px 15px; border: 1px solid var(--border) }
        .result-cell.full { grid-column: 1/-1 }
        .cell-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px }
        .cell-value { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.4px }
        .cell-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500 }
        .highlight-row { grid-column: 1/-1; border-radius: 12px; padding: 13px 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px }
        .highlight-row.comm-row { background: #f0fdf4; border: 1px solid #a7f3d0 }
        .highlight-row.extra-row { background: #fff7ed; border: 1px solid #fcd9a0 }
        .highlight-row .cell-label { font-weight: 700; margin: 0 }
        .highlight-row .cell-value { font-size: 18px; font-weight: 800 }
        .schedule-section { margin-top: 22px }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 11px }
        table { width: 100%; border-collapse: collapse; font-size: 13px }
        thead tr { background: var(--brand-blue); color: #fff }
        thead th { padding: 9px 11px; text-align: left; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .4px }
        tbody tr:nth-child(even) { background: #f8fafd }
        tbody tr:hover { background: #eef4ff }
        tbody td { padding: 6px 11px; border-bottom: 1px solid #f0f3f8; font-weight: 500 }
        tbody td:not(:first-child) { text-align: right }
        tfoot tr { background: #e8eef8; font-weight: 700 }
        tfoot td { padding: 8px 11px; border-top: 2px solid var(--brand-blue) }
        tfoot td:not(:first-child) { text-align: right }
        .empty-results { text-align: center; padding: 48px 20px; color: var(--muted) }
        .empty-results svg { opacity: .3; margin: 0 auto 12px; display: block }
        .empty-results p { font-size: 14px; font-weight: 500 }
        .action-btns { display: none; margin-top: 14px; gap: 10px }
        .action-btns.visible { display: flex }
        .btn-print { padding: 10px 20px; background: var(--brand-blue); color: #fff; border: none; border-radius: 8px; font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: .2s }
        .btn-print:hover { background: var(--brand-blue-light) }
        .btn-exit { display: none; padding: 10px 20px; background: #e2e8f0; color: var(--text); border: none; border-radius: 8px; font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer }
        body.client-mode header { display: none }
        body.client-mode main { padding: 16px }
        body.client-mode .form-card { display: none }
        body.client-mode .calculator-grid { grid-template-columns: 1fr }
        body.client-mode .btn-exit { display: inline-block }
        .client-summary-header { display: none; align-items: center; gap: 14px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--brand-blue) }
        body.client-mode .client-summary-header { display: flex }
        .print-title { font-size: 18px; font-weight: 800 }
        .print-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px }
        #printDoc { position: absolute; left: -9999px; top: 0; width: 210mm; visibility: hidden; pointer-events: none }
        @media (max-width: 640px) {
            .calculator-grid { grid-template-columns: 1fr !important }
        }
        @media print {
            @page { size: A4 portrait; margin: 8mm 10mm }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important }
            body>header, body>main, .action-btns { display: none !important }
            body { background: #fff; margin: 0; padding: 0 }
            #printDoc { display: block !important; position: static !important; left: auto !important; top: auto !important; visibility: visible !important; width: 100%; font-family: Arial, Helvetica, sans-serif; font-size: 8pt; color: #000 }
            .pd-logo-box { display: table; border: 1pt solid #1a4fa0; border-radius: 4pt; padding: 4pt 10pt; margin-bottom: 6pt }
            .pd-top { width: 100%; border-collapse: collapse; margin-bottom: 4pt; font-size: 8pt }
            .pd-top td { padding: 3pt 6pt; border: 0.5pt solid #b0bac8 }
            .pt-lbl { color: #222; width: 62% }
            .pt-val { font-weight: 700; text-align: right }
            .pd-cond { width: 100%; border-collapse: collapse; margin-bottom: 4pt; font-size: 8pt }
            .pd-cond-head td { background: #d0daea !important; font-weight: 700; text-align: center; padding: 3pt 6pt; border: 0.5pt solid #b0bac8 }
            .pd-cond td { padding: 3pt 6pt; border: 0.5pt solid #b0bac8 }
            .pc-lbl { color: #222; width: 52% }
            .pc-mid { color: #555; font-size: 7.5pt; text-align: center; width: 10% }
            .pc-val { font-weight: 700; text-align: right }
            .pd-sign { width: 100%; border-collapse: collapse; margin-bottom: 4pt; font-size: 8pt }
            .pd-sign td { padding: 3pt 6pt; border: 0.5pt solid #b0bac8 }
            .ps-lbl { color: #222; font-weight: 600; width: 62% }
            .ps-val { font-weight: 700; text-align: right; font-size: 8.5pt }
            .pd-debt { width: 100%; border-collapse: collapse; margin-bottom: 6pt; font-size: 8pt }
            .pd-debt td { padding: 3pt 6pt; border: 0.5pt solid #b0bac8 }
            .pdl { color: #222; width: 62% }
            .pdv { font-weight: 700; text-align: right }
            .pd-sched-wrap { border: 0.5pt solid #b0bac8 }
            .pd-sched-hd { font-size: 8pt; font-weight: 700; text-align: center; padding: 3pt; background: #eef2f8; border-bottom: 0.5pt solid #b0bac8 }
            .pd-sched { width: 100%; border-collapse: collapse; font-size: 7.5pt }
            .pd-sched thead th { color: #333; padding: 3pt 5pt; text-align: center; font-weight: 600; font-size: 7.5pt; border-bottom: 0.5pt solid #b0bac8; border-right: 0.5pt solid #d0d8e8 }
            .pd-sched tbody td { padding: 1.8pt 5pt; border-bottom: 0.3pt solid #e8ecf2; border-right: 0.3pt solid #e8ecf2; text-align: right }
            .pd-sched tbody td:first-child { text-align: center; color: #333 }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="#"><div class="logo-icon">Э</div></a>
        <div class="lang-switcher">
            <a class="active" onclick="setLang('ru')">RU</a>
            <a onclick="setLang('uz')">UZ</a>
            <a onclick="setLang('en')">ENG</a>
        </div>
    </header>
    <main>
        <div class="calculator-grid">
            <!-- форма -->
            <div class="card form-card">
                <div class="type-sw">
                    <button class="type-btn active" id="btnRass" onclick="switchType('rassrochka')">Рассрочка</button>
                    <button class="type-btn" id="btnLeas" onclick="switchType('leasing')">Лизинг (аннуитет)</button>
                </div>
                <div class="mode-sw" id="modeSwitcher">
                    <button class="mode-btn active" id="btnModeComm" onclick="switchMode('commission')">Комиссия</button>
                    <button class="mode-btn" id="btnModeExtra" onclick="switchMode('extra')">Доп.платежи</button>
                    <button class="mode-btn" id="btnModeMixed" onclick="switchMode('mixed')">Смешанный</button>
                </div>
                <div class="form-group">
                    <label data-i18n="obj_price">Стоимость объекта</label>
                    <input type="text" id="price" oninput="formatInput(this)" placeholder="0">
                </div>
                <div class="form-group">
                    <label data-i18n="advance_pct">Аванс (%)</label>
                    <div class="input-wrap">
                        <input type="number" id="advPct" min="1" max="99" step="1" placeholder="30">
                        <span class="input-suffix">%</span>
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="term_months">Срок (мес.)</label>
                    <input type="number" id="term" min="1" max="120" step="1" placeholder="24">
                </div>
                <button class="btn btn-primary" onclick="calculate()" data-i18n="calc_btn">Рассчитать</button>
                <button class="btn btn-secondary" style="margin-top:8px" onclick="enterClientMode()" data-i18n="client_btn">Режим для клиента</button>
            </div>
            <!-- результаты -->
            <div id="resultsPanel">
                <div class="client-summary-header">
                    <div class="logo-icon" style="width:42px;height:42px;font-size:22px">Э</div>
                    <div>
                        <div class="print-title">Eskhata Leasing</div>
                        <div class="print-subtitle">График платежей</div>
                    </div>
                </div>
                <div id="resultCards">
                    <div class="empty-results card">
                        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="3" width="20" height="18" rx="3"/><path d="M7 8h10M7 12h6M7 16h4"/>
                        </svg>
                        <p data-i18n="empty_hint">Введите параметры и нажмите «Рассчитать»</p>
                    </div>
                </div>
                <div id="scheduleSection" class="schedule-section" style="display:none">
                    <div class="section-title" data-i18n="schedule_title">График платежей</div>
                    <div class="card" style="padding:0;overflow:hidden">
                        <table id="screenTable">
                            <thead id="schedHead"></thead>
                            <tbody id="schedBody"></tbody>
                            <tfoot id="schedFoot"></tfoot>
                        </table>
                    </div>
                </div>
                <div class="action-btns" id="actionBtns">
                    <button class="btn-print" onclick="doPrint()">🖨 Распечатать</button>
                    <button class="btn-exit" onclick="exitClientMode()">← Назад</button>
                </div>
            </div>
        </div>
    </main>
    <div id="printDoc">
        <table class="pd-logo-box"><tr><td>Eskhata Leasing</td></tr></table>
        <table class="pd-top" id="pdTop"></table>
        <table class="pd-cond" id="pdCond"></table>
        <table class="pd-sign" id="pdSign"></table>
        <table class="pd-debt" id="pdDebt"></table>
        <div class="pd-sched-wrap">
            <div class="pd-sched-hd">График платежей</div>
            <table class="pd-sched" id="pdSched">
                <thead id="pdSchedHead"></thead>
                <tbody id="pdSchedBody"></tbody>
                <tfoot id="pdSchedFoot"></tfoot>
            </table>
        </div>
    </div>
    <script>
        /* i18n */
        const L = {
            ru: { obj_price: 'Стоимость объекта', advance_pct: 'Аванс (%)', term_months: 'Срок (мес.)',
                calc_btn: 'Рассчитать', client_btn: 'Режим для клиента',
                empty_hint: 'Введите параметры и нажмите «Рассчитать»',
                schedule_title: 'График платежей', print_btn: '🖨 Распечатать', exit_client: '← Назад' },
            uz: { obj_price: "Ob'ekt narxi", advance_pct: 'Avans (%)', term_months: 'Muddat (oy)',
                calc_btn: 'Hisoblash', client_btn: 'Mijoz rejimi',
                empty_hint: 'Parametrlarni kiriting va "Hisoblash" ni bosing',
                schedule_title: "To'lov jadvali", print_btn: '🖨 Chop etish', exit_client: '← Orqaga' },
            en: { obj_price: 'Object price', advance_pct: 'Advance (%)', term_months: 'Term (months)',
                calc_btn: 'Calculate', client_btn: 'Client mode',
                empty_hint: 'Enter parameters and click "Calculate"',
                schedule_title: 'Payment schedule', print_btn: '🖨 Print', exit_client: '← Back' }
        };
        let lang = 'ru';
        function t(k) { return L[lang][k] || k; }
        function setLang(l) {
            lang = l;
            document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
            document.querySelectorAll('.lang-switcher a').forEach(a => a.classList.toggle('active', a.textContent.toLowerCase() === l));
            if (lastResult) renderResults(lastResult);
        }

        /* режимы */
        let productType = 'rassrochka';
        let calcMode = 'commission';
        let lastResult = null;

        function switchType(tp) {
            productType = tp;
            document.getElementById('btnRass').classList.toggle('active', tp === 'rassrochka');
            document.getElementById('btnLeas').classList.toggle('active', tp === 'leasing');
            document.getElementById('modeSwitcher').style.display = (tp === 'rassrochka') ? 'grid' : 'none';
            clearResults();
        }
        function switchMode(md) {
            calcMode = md;
            document.getElementById('btnModeComm').classList.toggle('active', md === 'commission');
            document.getElementById('btnModeExtra').classList.toggle('active', md === 'extra');
            document.getElementById('btnModeMixed').classList.toggle('active', md === 'mixed');
            clearResults();
        }
        function clearResults() {
            lastResult = null;
            document.getElementById('resultCards').innerHTML = `<div class="empty-results card"><p>${t('empty_hint')}</p></div>`;
            document.getElementById('scheduleSection').style.display = 'none';
            document.getElementById('actionBtns').classList.remove('visible');
        }

        /* утилиты */
        function formatInput(el) { const r = el.value.replace(/[^\d]/g, ''); el.value = r ? Number(r).toLocaleString('ru-RU') : ''; }
        function parseVal(s) { return parseFloat(String(s).replace(/[^\d.]/g, '')) || 0; }
        function fmt(n) { return Math.round(n).toLocaleString('ru-RU'); }
        function fmtPct(n) { return (n * 100).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%'; }
        function ceilTo(v, step) { return Math.ceil((v + 1e-9) / step) * step; }

        /* константы */
        const LEASING_RATE = 0.2975;
        const FIXED_COMM = 0.025;
        const TARGET_IRR_ANNUAL = 0.32;
        const TARGET_MONTHLY = TARGET_IRR_ANNUAL / 12;
        const REG_FEE = 5800498;

        /* математика */
        function calcIRR(cfs) {
            let lo = -0.9999, hi = 50;
            let flo = 0, fhi = 0;
            for (let i = 0; i < cfs.length; i++) {
                flo += cfs[i] / Math.pow(1 + lo, i);
                fhi += cfs[i] / Math.pow(1 + hi, i);
            }
            if (flo * fhi > 0) return NaN;
            let mid;
            for (let it = 0; it < 200; it++) {
                mid = (lo + hi) / 2;
                let npv = 0;
                for (let i = 0; i < cfs.length; i++) npv += cfs[i] / Math.pow(1 + mid, i);
                if (Math.abs(npv) < 0.01) break;
                if (npv > 0) lo = mid; else hi = mid;
            }
            return mid;
        }

        function buildLeasingSchedule(debt, term) {
            const rate = LEASING_RATE / 12;
            const rows = [];
            let bal = debt;
            let pay;
            if (rate < 1e-12) pay = debt / term;
            else { const pv = (1 + rate) ** term; pay = debt * rate * pv / (pv - 1); }
            let totP = 0, totI = 0, totT = 0;
            for (let i = 1; i <= term; i++) {
                const intr = bal * rate;
                let princ = pay - intr;
                if (i === term) { princ = bal; pay = princ + intr; }
                if (princ < 0) princ = 0;
                bal = Math.max(0, bal - princ);
                totP += princ; totI += intr; totT += pay;
                rows.push({ n: i, pay, princ, intr, bal });
            }
            rows._totals = { pay: totT, princ: totP, intr: totI };
            return rows;
        }

        function solveRassrochka(price, advance, debt, term) {
            const makeCF0 = (margin) => advance - price + (margin * price) / 1.12 - REG_FEE;
            let margin = 0, extra = 0;
            if (calcMode === 'commission') {
                let lo = 0, hi = 1, mid;
                for (let it = 0; it < 40; it++) {
                    mid = (lo + hi) / 2;
                    const cfs = [makeCF0(mid)];
                    for (let i = 0; i < term; i++) cfs.push(debt / term);
                    const r = calcIRR(cfs);
                    if (isNaN(r)) break;
                    if (Math.abs(r - TARGET_MONTHLY) < 0.0001) break;
                    if (r > TARGET_MONTHLY) lo = mid; else hi = mid;
                }
                margin = ceilTo(mid, 0.001);
            } else if (calcMode === 'extra') {
                let lo = 0, hi = 100000000, mid;
                for (let it = 0; it < 40; it++) {
                    mid = (lo + hi) / 2;
                    const cfs = [makeCF0(0)];
                    for (let i = 0; i < term; i++) cfs.push(debt / term + mid);
                    const r = calcIRR(cfs);
                    if (isNaN(r)) break;
                    if (Math.abs(r - TARGET_MONTHLY) < 0.0001) break;
                    if (r > TARGET_MONTHLY) hi = mid; else lo = mid;
                }
                extra = ceilTo(mid, 50000);
            } else if (calcMode === 'mixed') {
                margin = 0.05;
                let lo = 0, hi = 100000000, mid;
                for (let it = 0; it < 40; it++) {
                    mid = (lo + hi) / 2;
                    const cfs = [makeCF0(margin)];
                    for (let i = 0; i < term; i++) cfs.push(debt / term + mid);
                    const r = calcIRR(cfs);
                    if (isNaN(r)) break;
                    if (Math.abs(r - TARGET_MONTHLY) < 0.0001) break;
                    if (r > TARGET_MONTHLY) hi = mid; else lo = mid;
                }
                extra = ceilTo(mid, 50000);
            }
            return { margin, extra };
        }

        function buildRassrochkaSchedule(debt, term, extra) {
            const rows = [];
            const mp = debt / term;
            let bal = debt, totP = 0, totT = 0;
            for (let i = 1; i <= term; i++) {
                let princ = (i === term) ? bal : mp;
                bal = Math.max(0, bal - princ);
                totP += princ;
                totT += princ + extra;
                rows.push({ n: i, pay: princ + extra, princ, bal });
            }
            rows._totals = { pay: totT, princ: totP };
            return rows;
        }

        /* основной расчёт */
        function calculate() {
            const price = parseVal(document.getElementById('price').value);
            const advPct = parseVal(document.getElementById('advPct').value) / 100;
            const term = parseInt(document.getElementById('term').value) || 0;
            if (price <= 0 || term <= 0) { alert('Введите корректные данные'); return; }

            if (productType === 'leasing') {
                const advance = price * advPct;
                const debt = price - advance;
                const commAmt = price * FIXED_COMM;
                const schedule = buildLeasingSchedule(debt, term);
                const tot = schedule._totals;
                const flatRate = tot.intr && debt > 0 && term > 0 ? tot.intr / (debt * term / 12) : 0;
                const totalPay = advance + tot.pay;
                lastResult = { type: 'leasing', price, advPct, advance, debt, term, commPct: FIXED_COMM, commAmt, schedule, flatRate, totalPay, tot };
            } else {
                if (advPct <= 0 || advPct >= 1) { alert('Аванс должен быть от 1 до 99%'); return; }
                const advance = price * advPct;
                const debt = price - advance;
                const sol = solveRassrochka(price, advance, debt, term);
                const schedule = buildRassrochkaSchedule(debt, term, sol.extra);
                const totalPay = advance + schedule._totals.pay + sol.margin * price;
                lastResult = { type: 'rassrochka', price, advPct, advance, debt, term, margin: sol.margin, extra: sol.extra, commAmt: sol.margin * price, schedule, totalPay };
            }
            renderResults(lastResult);
        }

        /* отрисовка */
        function renderResults(r) {
            let cards = '', schedHead = '', schedBody = '', schedFoot = '';
            if (r.type === 'leasing') {
                cards = `
                    <div class="results-grid">
                        <div class="result-cell"><div class="cell-label">Долг лизинга</div><div class="cell-value">${fmt(r.debt)}</div></div>
                        <div class="result-cell"><div class="cell-label">Аванс</div><div class="cell-value">${fmt(r.advance)}</div><div class="cell-sub">${(r.advPct*100).toFixed(0)}%</div></div>
                        <div class="result-cell full"><div class="cell-label">Общая сумма оплаты</div><div class="cell-value">${fmt(r.totalPay)}</div></div>
                        <div class="result-cell"><div class="cell-label">Ставка лизинга</div><div class="cell-value">${fmtPct(r.flatRate)}</div></div>
                        <div class="highlight-row comm-row"><div class="cell-label">Комиссия за оформление</div><div class="cell-value">${fmtPct(r.commPct)}</div><div>${fmt(r.commAmt)}</div></div>
                    </div>`;
                schedHead = `<tr><th>№</th><th>Платёж</th><th>Осн. долг</th><th>Проценты</th><th>Остаток</th></tr>`;
                r.schedule.forEach(row => {
                    schedBody += `<tr><td>${row.n}</td><td>${fmt(row.pay)}</td><td>${fmt(row.princ)}</td><td>${fmt(row.intr)}</td><td>${fmt(row.bal)}</td></tr>`;
                });
                schedFoot = `<tr><td>Итого</td><td>${fmt(r.tot.pay)}</td><td>${fmt(r.tot.princ)}</td><td>${fmt(r.tot.intr)}</td><td>—</td></tr>`;
            } else {
                cards = `
                    <div class="results-grid">
                        <div class="result-cell"><div class="cell-label">Долг</div><div class="cell-value">${fmt(r.debt)}</div></div>
                        <div class="result-cell"><div class="cell-label">Аванс</div><div class="cell-value">${fmt(r.advance)}</div><div class="cell-sub">${(r.advPct*100).toFixed(0)}%</div></div>
                        <div class="result-cell full"><div class="cell-label">Общая сумма оплаты</div><div class="cell-value">${fmt(r.totalPay)}</div></div>
                        <div class="highlight-row comm-row"><div class="cell-label">Комиссия за оформление</div><div class="cell-value">${fmtPct(r.margin)}</div><div>${fmt(r.commAmt)}</div></div>
                        ${r.extra > 0 ? `<div class="highlight-row extra-row"><div class="cell-label">Ежемесячный доп. платёж</div><div class="cell-value">${fmt(r.extra)}</div></div>` : ''}
                    </div>`;
                schedHead = `<tr><th>№</th><th>Сумма платежа</th><th>Остаток долга</th></tr>`;
                r.schedule.forEach(row => {
                    schedBody += `<tr><td>${row.n}</td><td>${fmt(row.pay)}</td><td>${fmt(row.bal)}</td></tr>`;
                });
                schedFoot = `<tr><td>Итого</td><td>${fmt(r.schedule._totals.pay)}</td><td>—</td></tr>`;
            }
            document.getElementById('resultCards').innerHTML = `<div class="card" style="margin-bottom:11px">${cards}</div>`;
            document.getElementById('schedHead').innerHTML = schedHead;
            document.getElementById('schedBody').innerHTML = schedBody;
            document.getElementById('schedFoot').innerHTML = schedFoot;
            document.getElementById('scheduleSection').style.display = 'block';
            document.getElementById('actionBtns').classList.add('visible');
        }

        function enterClientMode() { if (!lastResult) { alert('Сначала нажмите «Рассчитать»'); return; } document.body.classList.add('client-mode'); }
        function exitClientMode() { document.body.classList.remove('client-mode'); }

        function doPrint() {
            if (!lastResult) return;
            const r = lastResult;
            const comm = r.type === 'leasing' ? r.commAmt : r.commAmt;
            const sign = r.advance + comm;
            const contractTotal = sign + (r.tot ? r.tot.pay : r.schedule._totals.pay);
            document.getElementById('pdTop').innerHTML = `<tr><td class="pt-lbl">Стоимость объекта</td><td class="pt-val">${fmt(r.price)}</td></tr><tr><td class="pt-lbl">Общая стоимость договора</td><td class="pt-val">${fmt(contractTotal)}</td></tr>`;
            document.getElementById('pdCond').innerHTML = `<tr class="pd-cond-head"><td colspan="3">Условия</td></tr><tr><td class="pc-lbl">Тип</td><td></td><td class="pc-val">${r.type==='leasing'?'Аннуитет':'Рассрочка'}</td></tr><tr class="pc-alt"><td class="pc-lbl">Срок</td><td>Мес.</td><td class="pc-val">${r.term}</td></tr>${r.type==='leasing'?`<tr><td class="pc-lbl">Ставка</td><td></td><td class="pc-val">${fmtPct(r.flatRate)}</td></tr>`:''}<tr class="${r.type==='leasing'?'pc-alt':''}"><td class="pc-lbl">Аванс</td><td>${(r.advPct*100).toFixed(0)}%</td><td class="pc-val">${fmt(r.advance)}</td></tr><tr><td class="pc-lbl">Комиссия</td><td>${r.type==='leasing'?fmtPct(r.commPct):fmtPct(r.margin)}</td><td class="pc-val">${fmt(comm)}</td></tr>`;
            document.getElementById('pdSign').innerHTML = `<tr><td class="ps-lbl">К оплате при подписании</td><td class="ps-val">${fmt(sign)}</td></tr>`;
            document.getElementById('pdDebt').innerHTML = `<tr><td class="pdl">Долг лизинга</td><td class="pdv">${fmt(r.debt)}</td></tr>`;
            document.getElementById('pdSchedHead').innerHTML = r.type==='leasing'?`<tr><th>№</th><th>Платёж</th><th>Осн. долг</th><th>Проценты</th><th>Остаток</th></tr>`:`<tr><th>№</th><th>Платёж</th><th>Остаток</th></tr>`;
            let sbody = '';
            if (r.type==='leasing') {
                r.schedule.forEach(row => { sbody += `<tr><td>${row.n}</td><td>${fmt(row.pay)}</td><td>${fmt(row.princ)}</td><td>${fmt(row.intr)}</td><td>${fmt(row.bal)}</td></tr>`; });
                document.getElementById('pdSchedFoot').innerHTML = `<tr><td>Итого</td><td>${fmt(r.tot.pay)}</td><td>${fmt(r.tot.princ)}</td><td>${fmt(r.tot.intr)}</td><td>—</td></tr>`;
            } else {
                r.schedule.forEach(row => { sbody += `<tr><td>${row.n}</td><td>${fmt(row.pay)}</td><td>${fmt(row.bal)}</td></tr>`; });
                document.getElementById('pdSchedFoot').innerHTML = `<tr><td>Итого</td><td>${fmt(r.schedule._totals.pay)}</td><td>—</td></tr>`;
            }
            document.getElementById('pdSchedBody').innerHTML = sbody;
            setTimeout(() => window.print(), 100);
        }

        setLang('ru');
        switchType('rassrochka');
        switchMode('commission');
    </script>
</body>
